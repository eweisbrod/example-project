name: Draft JOSE PDF

# Builds the paper/ as a draft JOSE PDF using the same Inara engine
# the JOSE editorial bot uses, so the local preview matches what
# reviewers will see post-submission. Triggers only when paper/ or
# this workflow itself changes, so day-to-day topic-chapter and
# site edits don't burn Actions minutes.

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/draft-pdf.yml'
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Build draft PDF
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: jose
          paper-path: paper/paper.md

      - name: Upload built PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf

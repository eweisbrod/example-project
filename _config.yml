title: Example Research Project
description: A teaching hub for reproducible empirical research in accounting and finance
show_downloads: false
google_analytics:

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

color_scheme: light
search_enabled: true
heading_anchors: true

# Callout boxes (styled note/tip/warning panels in topic pages).
# Each entry defines a CSS class you can apply with {: .name } or
# {: .name-title } in markdown. See:
# https://just-the-docs.com/docs/configuration/#callouts
callouts_level: loud
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
  warning:
    title: Warning
    color: red

aux_links:
  "View on GitHub":
    - "https://github.com/eweisbrod/example-project"
aux_links_new_tab: true

footer_content: 'Eric Weisbrod &middot; <a href="https://github.com/eweisbrod/example-project/blob/main/LICENSE">CC-BY-4.0</a>'

exclude:
  - README.md           # included by index.md; don't render standalone
  - paper/
  - AGENTS.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
